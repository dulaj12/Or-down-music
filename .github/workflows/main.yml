name: Download Full Musical Show
on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: 'Facebook හෝ YouTube Live Link එක මෙතනට දෙන්න'
        required: true

jobs:
  download_job:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Install yt-dlp & ffmpeg
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Downloading Full Show
        run: |
          # Facebook බ්ලොක් කිරීම් වැළැක්වීමට විශේෂ Headers එකතු කර ඇත
          yt-dlp -f "bestvideo[height<=480]+bestaudio/best[height<=480]" \
          --no-check-certificate \
          --live-from-start \
          --wait-for-video 60 \
          --geo-bypass \
          --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36" \
          --add-header "Referer:https://www.facebook.com/" \
          --retry-sleep 5 \
          --retries infinite \
          --fragment-retries infinite \
          --merge-output-format mp4 \
          -o "musical_show.mp4" \
          "${{ github.event.inputs.stream_url }}"

      - name: Check if file exists
        if: always()
        run: ls -lh

      - name: Upload Full Video Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Full-Musical-Show-Video
          path: "*.mp4"
          retention-days: 1
          
