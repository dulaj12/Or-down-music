name: Download Full Musical Show
on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: 'Facebook හෝ YouTube Live Link එක මෙතනට දෙන්න'
        required: true

jobs:
  download_job:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Install yt-dlp & ffmpeg
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Downloading Full Show
        run: |
          # මෙහිදී 'mbasic' facebook ලින්ක් එකක් ලෙස පෙනී සිටීමට සලස්වා ඇත
          yt-dlp -f "bestvideo[height<=480]+bestaudio/best[height<=480]" \
          --no-check-certificate \
          --live-from-start \
          --wait-for-video 60 \
          --user-agent "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36" \
          --add-header "Accept:text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8" \
          --add-header "Accept-Language:en-US,en;q=0.5" \
          --referer "https://mbasic.facebook.com/" \
          --merge-output-format mp4 \
          -o "musical_show.mp4" \
          "${{ github.event.inputs.stream_url }}"

      - name: Check file existence
        if: always()
        run: ls -lh

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Full-Musical-Show-Video
          path: "*.mp4"
          retention-days: 1
          
