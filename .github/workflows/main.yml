name: Download Full Musical Show
on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: 'Facebook හෝ YouTube Live Link එක මෙතනට දෙන්න'
        required: true

jobs:
  download_job:
    runs-on: ubuntu-latest
    # උපරිම පැය 6ක් රන් වීමට ඉඩ ලබා දෙයි (GitHub වල උපරිමය මෙයයි)
    timeout-minutes: 360 

    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Install yt-dlp & ffmpeg
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Downloading Full Show
        run: |
          # --live-from-start: ලයිව් එකේ මුල සිටම බාගත කරයි
          # --wait-for-video: ලයිව් එක අතරතුර කනෙක්ෂන් ගියොත් තත්පර 60ක් රැඳී සිටියි
          # -o: වීඩියෝව musical_show.mp4 නමින් සේව් කරයි
          yt-dlp -f "bestvideo[height<=480]+bestaudio/best[height<=480]" \
          --no-check-certificate \
          --live-from-start \
          --wait-for-video 60 \
          --retry-sleep 5 \
          --retries infinite \
          --fragment-retries infinite \
          --merge-output-format mp4 \
          -o "musical_show.mp4" \
          "${{ github.event.inputs.stream_url }}"

      - name: Check if file exists
        if: always()
        run: ls -lh

      - name: Upload Full Video Artifact
        if: always() # බාගැනීම අතරතුර නතර වුවහොත් ඒ තාක් බාගත වූ කොටස අප්ලෝඩ් කරයි
        uses: actions/upload-artifact@v4
        with:
          name: Full-Musical-Show-Video
          path: musical_show.mp4
          retention-days: 1 # දින 1ක් ඇතුළත බාගත කරගන්න (පසුව මැකී යයි)
          
